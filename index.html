<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Recycle & Reuse Ideas</title>
  <head>
    <style>
      body {
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(to bottom right, #e6f4ea, #cde9d5);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
  
      .container {
        background-color: #ffffff;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 700px;
        width: 100%;
      }
  
      h1 {
        color: #2e7d32;
        font-size: 28px;
        margin-bottom: 20px;
      }
  
      select {
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #ccc;
        background-color: #f4fbf5;
        color: #7d2e40;
        transition: border 0.3s ease;
      }
  
      select:hover {
        border-color: #c2f508;
      }
  
      .result {
        margin-top: 30px;
      }
  
      .result h2 {
        color: #388e3c;
        font-size: 22px;
      }
  
      .image-gallery {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 20px;
      }
  
      .image-card {
        text-align: center;
        max-width: 160px;
        transition: transform 0.3s ease-in-out;
      }
  
      .image-card:hover {
        transform: scale(1.05);
      }
  
      .item-img {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
  
      .label {
        margin-top: 10px;
        font-size: 14px;
        color: #4e944f;
      }
    </style>
  
  
</head>

        "reuse": "Use as planters or as a quirky display.Old shoes can be creatively repurposed as planters or quirky displays. By filling them with soil and planting flowers, succulents, or herbs, they become unique, eco-friendly planters that add character to any garden or home. Their worn-out appearance can give them a rustic charm, making them perfect for an eclectic look. Alternatively, old shoes can be used as quirky displays by placing them on shelves or windowsills, filled with decorative items like fairy lights, pebbles, or artificial flowers. You can also personalize them by painting the shoes with vibrant colors, patterns, or designs to match your style. For added fun, use shoes with distinctive features like boots or sandals to create a whimsical touch. These upcycled shoes can also serve as conversation starters, drawing attention with their unexpected and creative use. This simple upcycling idea not only adds personality to your space but also helps reduce waste in a fun and creative way.",

      "Egg Carton": {
        "recycle": "Place in the paper recycling bin.",
        "reuse": "Use for organizing small items or as a craft project.An egg carton can be repurposed for organizing small items or as a fun craft project. It’s perfect for storing buttons, beads, screws, or jewelry, keeping these tiny items neat and easily accessible. For a craft project, you can transform the egg carton into unique creations like flowers, animals, or even decorative wreaths by cutting and painting the individual sections. The sturdy, compartmentalized design of an egg carton makes it a versatile and eco-friendly option for organization or creativity. Whether for functional storage or crafting, it offers a simple and sustainable way to repurpose an everyday item. Egg cartons can also be used as seed starters for gardening, where each section can hold a small amount of soil and seeds for growing plants like herbs or flowers. Additionally, they can be used for organizing arts and crafts supplies, such as crayons, markers, or small craft tools. For those interested in upcycling, egg cartons can even serve as a material for making homemade bird feeders, offering an innovative way to reuse and recycle. With a little creativity, egg cartons can become a handy and decorative addition to any home or craft space.",

      const selectedItem = this.value;
      const item = itemsData[selectedItem];
      const resultDiv = document.getElementById('result');
      
      if (item) {
        let html = `
          <h2>${selectedItem}</h2>
          <p><strong>Recycle:</strong> ${item.recycle}</p>
          <p><strong>Reuse:</strong> ${item.reuse}</p>
          <div class="image-gallery">
            ${item.images.map(img => `
              <div class="image-card">
                <img src="${img.url}" alt="${img.label}" class="item-img" />
                <p class="label">${img.label}</p>
              </div>
            `).join('')}
          </div>
        `;
        resultDiv.innerHTML = html;
      } else {
        resultDiv.innerHTML = '<p>Please select an item.</p>';
